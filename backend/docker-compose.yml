# backend/docker-compose.yml
version: '3.8'

services:
  api:
    build: .
    container_name: veda_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env  # Pulls secrets for local testing (Doppler handles this in prod)
    restart: unless-stopped
    volumes:
      - .:/app  # Maps local files for live-reloading during dev

  worker:
    build: .
    container_name: veda_worker
    command: arq worker.WorkerSettings
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - .:/app
    depends_on:
      - api # Ensures API boots first